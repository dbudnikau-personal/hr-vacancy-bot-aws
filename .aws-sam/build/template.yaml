AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "HR Vacancy Bot \u2014 AWS Lambda"
Globals:
  Function:
    Runtime: java21
    MemorySize: 1024
    Architectures:
    - arm64
    Environment:
      Variables:
        SPRING_DATASOURCE_URL:
          Ref: SpringDatasourceUrl
        SPRING_DATASOURCE_USERNAME:
          Ref: SpringDatasourceUsername
        SPRING_DATASOURCE_PASSWORD:
          Ref: SpringDatasourcePassword
        BOT_TOKEN:
          Ref: BotToken
        DEEPSEEK_API_KEY:
          Ref: DeepSeekApiKey
Parameters:
  SpringDatasourceUrl:
    Type: String
    Description: JDBC URL for PostgreSQL (Neon)
  SpringDatasourceUsername:
    Type: String
    Description: Database user
  SpringDatasourcePassword:
    Type: String
    NoEcho: true
    Description: Database password
  BotToken:
    Type: String
    NoEcho: true
    Description: Telegram bot token
  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Description: DeepSeek API key
Resources:
  BotHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hr-vacancy-bot-handler
      Handler: com.hrbot.lambda.BotHandlerLambda::handleRequest
      CodeUri: BotHandlerFunction
      Timeout: 60
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      Events:
        WebhookApi:
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: POST
    Metadata:
      SamResourceId: BotHandlerFunction
  VacancyScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hr-vacancy-bot-scanner
      Handler: com.hrbot.lambda.ScannerLambda::handleRequest
      CodeUri: VacancyScannerFunction
      Timeout: 300
      MemorySize: 1024
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      Events:
        ScanSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(2 hours)
            Enabled: true
    Metadata:
      SamResourceId: VacancyScannerFunction
Outputs:
  WebhookUrl:
    Description: "Telegram webhook URL \u2014 register this with setWebhook"
    Value:
      Fn::Sub: https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook
