spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hrbot}
    username: ${SPRING_DATASOURCE_USERNAME:hrbot}
    password: ${SPRING_DATASOURCE_PASSWORD:hrbot}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

bot:
  token: ${BOT_TOKEN}
  scan:
    cron: ${BOT_SCAN_CRON:0 0 */2 * * *}

logging:
  level:
    com.hrbot: INFO
    com.hrbot.parser: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
