spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

bot:
  token: ${BOT_TOKEN}
  version: "@project.version@.${GIT_SHA:local}"

scanner:
  function:
    name: ${SCANNER_FUNCTION_NAME:hr-vacancy-bot-scanner}

deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  base-url: https://api.deepseek.com
  model: deepseek-chat

wellfound:
  cookie-datadome: ${WELLFOUND_COOKIE_DATADOME:}
  cookie-cf-clearance: ${WELLFOUND_COOKIE_CF_CLEARANCE:}

logging:
  level:
    com.hrbot: INFO
    com.hrbot.parser: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
