spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: 0
      maximum-pool-size: 5
      max-lifetime: 60000
      keepalive-time: 30000
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

bot:
  token: ${BOT_TOKEN}
  version: "@project.version@.${GIT_SHA:local}"

admin:
  chat:
    id: ${ADMIN_CHAT_ID:0}

scanner:
  function:
    name: ${SCANNER_FUNCTION_NAME:hr-vacancy-bot-scanner}

cookie:
  refresher:
    function:
      name: ${COOKIE_REFRESHER_FUNCTION_NAME:hr-vacancy-bot-cookie-refresher}

deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  base-url: https://api.deepseek.com
  model: deepseek-chat

logging:
  level:
    com.hrbot: INFO
    com.hrbot.parser: DEBUG
