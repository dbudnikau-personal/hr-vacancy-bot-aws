AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HR Vacancy Bot — AWS Lambda

Globals:
  Function:
    MemorySize: 1024

Parameters:
  BotVersion:
    Type: String
    Default: local
    Description: Git commit SHA injected by CI

Resources:
  BotHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hr-vacancy-bot-handler
      Handler: com.hrbot.lambda.BotHandlerLambda::handleRequest
      Runtime: java21
      CodeUri: .
      Timeout: 60
      Architectures:
        - arm64
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      Environment:
        Variables:
          GIT_SHA: !Ref BotVersion
          SCANNER_FUNCTION_NAME: !Sub "${VacancyScannerFunction.Arn}:live"
          SCAN_SCHEDULE_RULE_NAME: hr-vacancy-bot-scan-schedule
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "${VacancyScannerFunction.Arn}:live"
            - Effect: Allow
              Action: ssm:GetParameters
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/datasource/url"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/datasource/username"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/datasource/password"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/bot/token"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/deepseek/api-key"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/admin/chat-id"
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:PutParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/scanning/paused"
            - Effect: Allow
              Action:
                - events:DescribeRule
                - events:PutRule
              Resource: !GetAtt ScanScheduleRule.Arn
      Events:
        WebhookApi:
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: POST

  VacancyScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hr-vacancy-bot-scanner
      Handler: com.hrbot.lambda.ScannerLambda::handleRequest
      Runtime: java21
      CodeUri: .
      Timeout: 300
      MemorySize: 1024
      Architectures:
        - arm64
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      EventInvokeConfig:
        MaximumRetryAttempts: 0
      Environment:
        Variables:
          GIT_SHA: !Ref BotVersion
          COOKIE_REFRESHER_FUNCTION_NAME: !GetAtt CookieRefresherFunction.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameters
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/datasource/url"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/datasource/username"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/datasource/password"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/bot/token"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/deepseek/api-key"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/admin/chat-id"
            - Effect: Allow
              Action: ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/wellfound/*"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/scanning/paused"
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt CookieRefresherFunction.Arn

  ScanScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: hr-vacancy-bot-scan-schedule
      Description: Triggers VacancyScannerFunction on a configurable interval (default 3 days)
      ScheduleExpression: rate(3 days)
      State: ENABLED
      Targets:
        - Id: VacancyScannerTarget
          Arn: !Sub "${VacancyScannerFunction.Arn}:live"

  ScanScheduleRulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "${VacancyScannerFunction.Arn}:live"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScanScheduleRule.Arn

  CookieRefresherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hr-vacancy-bot-cookie-refresher
      PackageType: Image
      Architectures:
        - x86_64
      Timeout: 120
      MemorySize: 1024
      EventInvokeConfig:
        MaximumRetryAttempts: 0
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: ssm:PutParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/wellfound/*"
            - Effect: Allow
              Action:
                - kms:GenerateDataKey
                - kms:Decrypt
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"
    Metadata:
      DockerTag: cookie-refresher
      DockerContext: ./cookie-refresher
      Dockerfile: Dockerfile

Outputs:
  WebhookUrl:
    Description: Telegram webhook URL — register this with setWebhook
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"
