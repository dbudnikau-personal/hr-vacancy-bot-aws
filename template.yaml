AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HR Vacancy Bot — AWS Lambda

Globals:
  Function:
    MemorySize: 1024
    Environment:
      Variables:
        SPRING_DATASOURCE_URL: !Ref SpringDatasourceUrl
        SPRING_DATASOURCE_USERNAME: !Ref SpringDatasourceUsername
        SPRING_DATASOURCE_PASSWORD: !Ref SpringDatasourcePassword
        BOT_TOKEN: !Ref BotToken
        DEEPSEEK_API_KEY: !Ref DeepSeekApiKey
        GIT_SHA: !Ref BotVersion

Parameters:
  SpringDatasourceUrl:
    Type: String
    NoEcho: true
    Description: JDBC URL for PostgreSQL (Neon)
  SpringDatasourceUsername:
    Type: String
    NoEcho: true
    Description: Database user
  SpringDatasourcePassword:
    Type: String
    NoEcho: true
    Description: Database password
  BotToken:
    Type: String
    NoEcho: true
    Description: Telegram bot token
  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Description: DeepSeek API key
  BotVersion:
    Type: String
    Default: local
    Description: Git commit SHA injected by CI
  AdminChatId:
    Type: String
    Default: "0"
    Description: Telegram chat ID to notify on deployment

Resources:
  WebhookRegistrarRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: hr-vacancy-bot-webhook-registrar-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  WebhookRegistrarFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: hr-vacancy-bot-webhook-registrar
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt WebhookRegistrarRole.Arn
      Code:
        ZipFile: |
          import urllib.request
          import urllib.parse
          import json
          import logging
          import cfnresponse

          logging.getLogger().setLevel(logging.WARNING)

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  bot_token = event['ResourceProperties']['BotToken']
                  webhook_url = event['ResourceProperties']['WebhookUrl']

                  data = urllib.parse.urlencode({'url': webhook_url}).encode()
                  api_url = f"https://api.telegram.org/bot{bot_token}/setWebhook"
                  req = urllib.request.Request(api_url, data=data, method='POST')
                  with urllib.request.urlopen(req) as resp:
                      body = json.loads(resp.read())

                  if body.get('ok'):
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {'Result': 'Webhook registered'})
                  else:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {'Result': str(body)})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': type(e).__name__})

  WebhookRegistration:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: BotHandlerFunction
    Properties:
      ServiceToken: !GetAtt WebhookRegistrarFunction.Arn
      BotToken: !Ref BotToken
      WebhookUrl: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"

  BotHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hr-vacancy-bot-handler
      Handler: com.hrbot.lambda.BotHandlerLambda::handleRequest
      Runtime: java21
      CodeUri: .
      Timeout: 60
      Architectures:
        - arm64
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      Environment:
        Variables:
          SCANNER_FUNCTION_NAME: !Sub "${VacancyScannerFunction.Arn}:live"
          ADMIN_CHAT_ID: !Ref AdminChatId
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "${VacancyScannerFunction.Arn}:live"
      Events:
        WebhookApi:
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: POST

  VacancyScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hr-vacancy-bot-scanner
      Handler: com.hrbot.lambda.ScannerLambda::handleRequest
      Runtime: java21
      CodeUri: .
      Timeout: 300
      MemorySize: 1024
      Architectures:
        - arm64
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      EventInvokeConfig:
        MaximumRetryAttempts: 0
      Environment:
        Variables:
          COOKIE_REFRESHER_FUNCTION_NAME: !GetAtt CookieRefresherFunction.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/wellfound/*"
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt CookieRefresherFunction.Arn
      Events:
        ScanSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(2 hours)
            Enabled: true

  CookieRefresherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hr-vacancy-bot-cookie-refresher
      PackageType: Image
      Architectures:
        - x86_64
      Timeout: 120
      MemorySize: 1024
      EventInvokeConfig:
        MaximumRetryAttempts: 0
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: ssm:PutParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hrbot/wellfound/*"
            - Effect: Allow
              Action:
                - kms:GenerateDataKey
                - kms:Decrypt
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"
    Metadata:
      DockerTag: cookie-refresher
      DockerContext: ./cookie-refresher
      Dockerfile: Dockerfile

  BotHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/hr-vacancy-bot-handler
      RetentionInDays: 30

  VacancyScannerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/hr-vacancy-bot-scanner
      RetentionInDays: 30

  CookieRefresherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/hr-vacancy-bot-cookie-refresher
      RetentionInDays: 30

  WebhookRegistrarLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/hr-vacancy-bot-webhook-registrar
      RetentionInDays: 7

Outputs:
  WebhookUrl:
    Description: Telegram webhook URL — register this with setWebhook
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"
