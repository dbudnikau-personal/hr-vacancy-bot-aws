name: Deploy Cookie Refresher

on:
  push:
    branches: [master]
    paths:
      - 'cookie-refresher/**'

jobs:
  deploy:
    name: Build & Deploy Cookie Refresher
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - uses: aws-actions/amazon-ecr-login@v2.1.4

      - name: Build
        run: sam build CookieRefresherFunction

      - name: Deploy
        run: |
          sam deploy --no-confirm-changeset --resolve-image-repos \
            --parameter-overrides \
              "SpringDatasourceUrl=${{ secrets.SPRING_DATASOURCE_URL }}" \
              "SpringDatasourceUsername=${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              "SpringDatasourcePassword=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              "BotToken=${{ secrets.BOT_TOKEN }}" \
              "DeepSeekApiKey=${{ secrets.DEEPSEEK_API_KEY }}" \
              "BotVersion=${GITHUB_SHA::7}" \
              "AdminChatId=${{ vars.ADMIN_CHAT_ID }}"
