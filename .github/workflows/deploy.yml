name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'template.yaml'
      - 'samconfig.toml'
      - 'Makefile'
      - 'cookie-refresher/**'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Test & Package
        run: mvn package -q

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: maven-build
          path: target/hr-vacancy-bot-aws-*.jar
          retention-days: 1

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/download-artifact@v4.3.0
        with:
          name: maven-build
          path: target/

      - uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-sam-pip-${{ hashFiles('.github/workflows/deploy.yml') }}
          restore-keys: ${{ runner.os }}-sam-pip-

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - uses: aws-actions/amazon-ecr-login@v2.1.4

      - name: Debug - target contents
        run: ls -la target/

      - name: Build
        run: sam build

      - name: Debug - build artifacts
        run: ls -la .aws-sam/build/BotHandlerFunction/

      - name: Deploy
        run: |
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --resolve-image-repos \
            --parameter-overrides \
              "SpringDatasourceUrl=${{ secrets.SPRING_DATASOURCE_URL }}" \
              "SpringDatasourceUsername=${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              "SpringDatasourcePassword=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              "BotToken=${{ secrets.BOT_TOKEN }}" \
              "DeepSeekApiKey=${{ secrets.DEEPSEEK_API_KEY }}" \
              "BotVersion=${GITHUB_SHA::7}" \
              "AdminChatId=${{ vars.ADMIN_CHAT_ID }}"
