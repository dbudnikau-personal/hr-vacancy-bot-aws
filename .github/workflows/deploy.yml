name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'template.yaml'
      - 'samconfig.toml'
      - 'cookie-refresher/**'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build & Test
        run: mvn package -q

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-sam-pip-${{ hashFiles('.github/workflows/deploy.yml') }}
          restore-keys: ${{ runner.os }}-sam-pip-

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - uses: aws-actions/amazon-ecr-login@v2.1.4

      - name: Push secrets to SSM
        run: |
          aws ssm put-parameter --name /hrbot/datasource/url      --value "${{ secrets.SPRING_DATASOURCE_URL }}"      --type SecureString --overwrite
          aws ssm put-parameter --name /hrbot/datasource/username  --value "${{ secrets.SPRING_DATASOURCE_USERNAME }}"  --type SecureString --overwrite
          aws ssm put-parameter --name /hrbot/datasource/password  --value "${{ secrets.SPRING_DATASOURCE_PASSWORD }}"  --type SecureString --overwrite
          aws ssm put-parameter --name /hrbot/bot/token            --value "${{ secrets.BOT_TOKEN }}"                   --type SecureString --overwrite
          aws ssm put-parameter --name /hrbot/deepseek/api-key     --value "${{ secrets.DEEPSEEK_API_KEY }}"            --type SecureString --overwrite
          aws ssm put-parameter --name /hrbot/admin/chat-id        --value "${{ secrets.ADMIN_CHAT_ID }}"               --type SecureString --overwrite

      - name: Build
        run: sam build

      - name: Deploy
        run: |
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --resolve-image-repos \
            --parameter-overrides \
              "BotVersion=${GITHUB_SHA::7}"

      - name: Register Telegram webhook
        run: |
          BOT_TOKEN=$(aws ssm get-parameter --name /hrbot/bot/token --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$BOT_TOKEN"
          WEBHOOK_URL=$(aws cloudformation describe-stacks --stack-name hr-vacancy-bot \
            --query "Stacks[0].Outputs[?OutputKey=='WebhookUrl'].OutputValue" --output text)
          RESULT=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" -d "url=${WEBHOOK_URL}")
          echo "setWebhook result: $(echo $RESULT | jq -r .description)"
          echo $RESULT | jq -e '.ok == true'

      - name: Set CloudWatch log retention
        run: |
          for log_group in \
            /aws/lambda/hr-vacancy-bot-handler \
            /aws/lambda/hr-vacancy-bot-scanner \
            /aws/lambda/hr-vacancy-bot-cookie-refresher; do
            aws logs put-retention-policy --log-group-name "$log_group" --retention-in-days 30 || true
          done
